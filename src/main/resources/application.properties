spring.application.name=plataforma-educativa

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:plataformadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# AWS S3
aws.access.key.id=${AWS_ACCESS_KEY_ID}
aws.secret.access.key=${AWS_SECRET_ACCESS_KEY}
aws.region=us-east-1
aws.s3.bucket=plataforma-educativa-duoc

# EFS path
app.efs.path=/app/efs

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Server
server.port=8080

# Spring Security - Azure AD B2C JWT
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://plataformaeducativacdy2204.b2clogin.com/plataformaeducativacdy2204.onmicrosoft.com/B2C_1_signupsignin/discovery/v2.0/keys
